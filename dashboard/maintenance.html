<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance — YMG IQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="../images/logo-2.png" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #060d0a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(34,197,94,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .maint-card {
      position: relative;
      max-width: 520px;
      width: 100%;
      background: #0d1f14;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .maint-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .maint-logo img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
    }

    .maint-logo span {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #c9a84c;
    }

    .maint-icon-wrap {
      width: 88px;
      height: 88px;
      background: rgba(201,168,76,0.1);
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .maint-icon-wrap i {
      font-size: 2rem;
      color: #c9a84c;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
      50%       { box-shadow: 0 0 0 16px rgba(201,168,76,0); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .maint-sub {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .maint-sub strong {
      color: #c9a84c;
    }

    .maint-divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #c9a84c, #22c55e);
      border-radius: 4px;
      margin: 0 auto 28px;
    }

    .maint-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .maint-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c9a84c;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .maint-dots span:nth-child(2) { animation-delay: 0.2s; }
    .maint-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    .maint-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #c9a84c, #a8873d);
      color: #060d0a;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(201,168,76,0.25);
    }

    .maint-back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.35);
    }

    .maint-footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #475569;
    }

    @media (max-width: 480px) {
      .maint-card { padding: 36px 24px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="maint-card">

    <div class="maint-logo">
      <img src="../images/logo.jpeg" alt="YMG IQ">
      <span>YMG IQ</span>
    </div>

    <div class="maint-icon-wrap">
      <i class="fa-solid fa-gear fa-spin"></i>
    </div>

    <h1>We'll Be Right Back</h1>

    <div class="maint-divider"></div>

    <p class="maint-sub">
      YMG IQ is currently undergoing <strong>scheduled maintenance</strong>.<br>
      We're working hard to improve your experience and will be back shortly.<br><br>
      Thank you for your patience.
    </p>

    <div class="maint-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <a href="../index.html" class="maint-back-btn">
      <i class="fa-solid fa-house"></i>
      Back to Homepage
    </a>

    <p class="maint-footer">
      © 2026 YMG IQ. All rights reserved.<br>
      If you have urgent questions, contact support.
    </p>

  </div>

</body>
</html>
